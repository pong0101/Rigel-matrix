<!DOCTYPE html><html><head><title>Rigel Matrix</title><style>body{font-family:sans-serif;background:#0b1020;color:white;padding:30px}button,input{padding:10px;margin:5px}</style></head><body><h1>Rigel Matrix Control</h1><input id='task' placeholder='Enter task'><button onclick='sendTask()'>Run</button><pre id='output'></pre><script>async function sendTask(){const task=document.getElementById('task').value;const r=await fetch('/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({task})});document.getElementById('output').innerText=await r.text();}</script></body></html>
