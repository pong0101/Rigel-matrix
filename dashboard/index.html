<!DOCTYPE html><html><head><title>Rigel Matrix</title><style>body{font-family:sans-serif;background:#0b1020;color:white;padding:20px}input,select,button{padding:8px;margin:4px;width:100%}section{background:#111827;padding:15px;margin:10px 0}</style></head><body><h1>Rigel Matrix Control</h1><section><h3>Status</h3><pre id='status'></pre></section><section><h3>Task</h3><input id='task'><button onclick='sendTask()'>Run</button><pre id='output'></pre></section><section><h3>Provider Settings</h3><select id='provider'><option>deepseek</option><option>openai</option><option>custom</option></select><input id='base_url' placeholder='Base URL'><input id='model'><input id='temperature' type='number' step='0.1'><input id='max_tokens' type='number'><input id='timeout_seconds' type='number'><input id='api_key' placeholder='API key'><button onclick='saveSettings()'>Save</button></section><script>async function loadStatus(){status.innerText=JSON.stringify(await (await fetch('/status')).json(),null,2)}async function sendTask(){output.innerText=JSON.stringify(await (await fetch('/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({task:task.value})})).json(),null,2)}async function loadSettings(){let s=await (await fetch('/settings')).json();for(let k in s){if(document.getElementById(k))document.getElementById(k).value=s[k]}}async function saveSettings(){let data={provider:provider.value,base_url:base_url.value,model:model.value,temperature:+temperature.value,max_tokens:+max_tokens.value,timeout_seconds:+timeout_seconds.value,api_key:api_key.value};await fetch('/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({data})});alert('saved')}loadStatus();loadSettings();setInterval(loadStatus,5000)</script></body></html>
