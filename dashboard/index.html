<!DOCTYPE html><html><head><title>Rigel Matrix</title><style>body{font-family:sans-serif;background:#0b1020;color:white;padding:20px}input,select,button{padding:8px;margin:4px;width:100%}section{background:#111827;padding:15px;margin:10px 0}</style></head><body><h1>Rigel Matrix Control</h1><section><h3>Status</h3><pre id='status'></pre></section><section><h3>Task</h3><input id='task'><button onclick='sendTask()'>Run</button><pre id='output'></pre></section><section><h3>DeepSeek Settings</h3><select id='provider'><option>deepseek</option></select><input id='model' value='deepseek-chat'><input id='temperature' type='number' step='0.1' value='0.7'><input id='max_tokens' type='number' value='1024'><input id='api_key' placeholder='API key'><button>Save</button></section><script>async function loadStatus(){let r=await fetch('/status');status.innerText=JSON.stringify(await r.json(),null,2)}async function sendTask(){let r=await fetch('/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({task:task.value})});output.innerText=JSON.stringify(await r.json(),null,2)}loadStatus();setInterval(loadStatus,5000)</script></body></html>
