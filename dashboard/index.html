<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Rigel Matrix Boardroom</title><style>:root{--bg:#070b16;--panel:#111827;--panel2:#0f172a;--line:#263244;--text:#e5e7eb;--muted:#94a3b8;--accent:#38bdf8;--ok:#22c55e;--warn:#f59e0b}*{box-sizing:border-box}body{margin:0;font-family:Arial,'Noto Sans Thai',sans-serif;background:radial-gradient(circle at top,#10203a,#070b16 55%);color:var(--text)}header{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;background:rgba(7,11,22,.9)}h1{margin:0;font-size:22px}.badge{border:1px solid var(--line);padding:6px 10px;border-radius:999px;color:var(--muted)}main{display:grid;grid-template-columns:260px 1fr 320px;gap:14px;padding:14px;height:calc(100vh - 70px)}section{background:rgba(17,24,39,.92);border:1px solid var(--line);border-radius:16px;padding:14px;overflow:auto}.agent{display:flex;gap:10px;align-items:center;padding:10px;border:1px solid var(--line);border-radius:12px;margin:8px 0;background:var(--panel2)}.dot{width:10px;height:10px;border-radius:50%;background:var(--ok);box-shadow:0 0 12px var(--ok)}.role{font-size:12px;color:var(--muted)}.meeting{display:flex;flex-direction:column;height:100%}.transcript{flex:1;overflow:auto;border:1px solid var(--line);border-radius:14px;padding:12px;background:#08111f}.msg{padding:10px;margin:8px 0;border-left:3px solid var(--accent);background:#0d1728;border-radius:10px}.speaker{font-weight:bold;color:var(--accent)}.command{display:flex;gap:8px;margin-top:12px}input,select,button{border:1px solid var(--line);border-radius:10px;background:#0b1220;color:var(--text);padding:10px}input,select{width:100%}button{cursor:pointer;background:#0ea5e9;color:white;font-weight:bold}.grid{display:grid;gap:8px}.status{white-space:pre-wrap;font-size:12px;color:var(--muted)}label{font-size:12px;color:var(--muted)}@media(max-width:900px){main{grid-template-columns:1fr;height:auto}.command{flex-direction:column}}</style></head><body><header><h1>Rigel Matrix Boardroom</h1><div class="badge">AI Operating Company</div></header><main><section><h3>Agents in Meeting</h3><div class="agent"><div class="dot"></div><div><b>RM-CEO</b><div class="role">Coordinator</div></div></div><div class="agent"><div class="dot"></div><div><b>RM-SYS</b><div class="role">System Monitor</div></div></div><div class="agent"><div class="dot"></div><div><b>RM-ANL</b><div class="role">Error Analyst</div></div></div><div class="agent"><div class="dot"></div><div><b>RM-DEV</b><div class="role">Developer</div></div></div><div class="agent"><div class="dot"></div><div><b>RM-MEM</b><div class="role">Memory Keeper</div></div></div></section><section class="meeting"><h3>Meeting Transcript</h3><div id="output" class="transcript"><div class="msg"><div class="speaker">RM-CEO</div>พร้อมประชุม ส่งโจทย์เข้ามาได้เลย</div></div><div class="command"><input id="task" placeholder="พิมพ์หัวข้อประชุม เช่น วิเคราะห์ Python error"><button onclick="sendTask()">Start Meeting</button></div></section><section><h3>System Status</h3><pre id="status" class="status">Loading...</pre><h3>Provider Settings</h3><div class="grid"><label>Provider</label><select id="provider"><option>deepseek</option><option>openai</option><option>custom</option></select><label>Base URL</label><input id="base_url"><label>Model</label><input id="model"><label>Temperature</label><input id="temperature" type="number" step="0.1"><label>Max Tokens</label><input id="max_tokens" type="number"><label>Timeout</label><input id="timeout_seconds" type="number"><label>API Key</label><input id="api_key" placeholder="hidden after save"><button onclick="saveSettings()">Save Settings</button></div></section></main><script>function renderMeeting(data){let html='';for(const [agent,text] of Object.entries(data)){html+=`<div class="msg"><div class="speaker">${agent}</div>${text}</div>`}output.innerHTML=html}async function loadStatus(){status.innerText=JSON.stringify(await (await fetch('/status')).json(),null,2)}async function sendTask(){const topic=task.value.trim();if(!topic)return;output.innerHTML='<div class="msg"><div class="speaker">RM-CEO</div>กำลังเปิดประชุม...</div>';let r=await fetch('/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({task:topic})});renderMeeting(await r.json())}async function loadSettings(){let s=await (await fetch('/settings')).json();for(let k in s){let el=document.getElementById(k);if(el)el.value=s[k]||''}}async function saveSettings(){let data={provider:provider.value,base_url:base_url.value,model:model.value,temperature:+temperature.value,max_tokens:+max_tokens.value,timeout_seconds:+timeout_seconds.value,api_key:api_key.value};await fetch('/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({data})});alert('Settings saved')}loadStatus();loadSettings();setInterval(loadStatus,5000)</script></body></html>
