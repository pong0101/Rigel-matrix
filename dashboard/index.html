<!DOCTYPE html><html><head><title>Rigel Matrix</title><style>body{font-family:sans-serif;background:#0b1020;color:white;padding:30px}button,input{padding:10px;margin:5px}#status{background:#111827;padding:15px;white-space:pre-wrap}</style></head><body><h1>Rigel Matrix Control</h1><div id='status'>Loading...</div><input id='task'><button onclick='sendTask()'>Run</button><pre id='output'></pre><script>async function loadStatus(){let r=await fetch('/status');document.getElementById('status').innerText=JSON.stringify(await r.json(),null,2)}async function sendTask(){const task=document.getElementById('task').value;const r=await fetch('/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({task})});document.getElementById('output').innerText=JSON.stringify(await r.json(),null,2)}loadStatus();setInterval(loadStatus,5000)</script></body></html>
